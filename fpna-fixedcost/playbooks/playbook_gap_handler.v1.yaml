name: playbook_gap_handler
version: 1
status: active
kind: meta
trigger_spec: { match: none, description: "미매칭 work_item→신규 플레이북 제안(자기확장 §11)" }
allowed_emits: { task: [propose_playbook] }
gates: {}
procedure: |
  1) 미매칭 work_item 패턴 분석.
  2) 신규 플레이북 초안 작성 → propose_playbook task(사람 승인 필수).
  3) 승인 시 active 등록 → awaiting_playbook work_item 재라우팅. 코드 변경 없이 능력 추가.
